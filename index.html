<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Now You'll Never</title>

  <style>
    @font-face {
      font-family: 'AwesomeBiPolar';
      src: url('./fonts/AwesomeBi_polar-Regular.ttf') format('truetype');
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: white;
    }

    body {
      font-family: 'AwesomeBiPolar', serif;
    }

    .hero {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      font-family: 'AwesomeBiPolar', serif;
    }

    a {
      color: black;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.7;
    }

    .title-link {
      display: block;
    }

    .container > .title-link:first-child {
      font-size: 48px;
    }

    .line2 { font-size: 36px; color: #267365; }
    .line3 { font-size: 28px; color: #F2CB05; }
    .line4 { font-size: 22px; color: #F29F05; }
    .line5 { font-size: 18px; color: #F28705; }
    .line6 { font-size: 14px; color: #F23030; }

    .line {
      margin-top: 5px;
    }

    .photo-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-left: 20%;
      box-sizing: border-box;
    }

    .photo-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .photo-row img {
      width: 320px;
      height: auto;
      display: block;
    }

    .photo-text {
      font-size: 70px;
      color: black;
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="container">
      <a class="title-link" href="contents.html">Now You'll Never</a>

      <a class="line title-link line2" href="contents.html">Now You'll Never</a>
      <a class="line title-link line3" href="contents.html">Now You'll Never</a>
      <a class="line title-link line4" href="contents.html">Now You'll Never</a>
      <a class="line title-link line5" href="contents.html">Now You'll Never</a>
      <a class="line title-link line6" href="contents.html">Now You'll Never</a>
    </div>
  </section>

  <section class="photo-section">
    <div class="photo-row">
      <img src="./images/ducks.jpg" alt="ducks" />
      <div class="photo-text">i like this duck btw </div>
    </div>
  </section>
</body>
</html>
