<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minigame</title>

  <style>
    @font-face {
      font-family: 'AwesomeBiPolar';
      src: url('../fonts/AwesomeBi_polar-Regular.ttf') format('truetype');
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: white;
    }

    body {
      font-family: 'AwesomeBiPolar', serif;
    }

    .home-link {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 30;
      color: black;
      text-decoration: none;
      font-size: 30px;
      font-family: 'AwesomeBiPolar', serif;
    }

    .home-link:hover {
      opacity: 0.6;
    }

    .game-list {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      padding: 96px 32px;
    }

    .game-link {
      color: black;
      text-decoration: none;
      font-size: 42px;
      font-family: 'AwesomeBiPolar', serif;
    }

    .game-link:hover {
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <a class="home-link" href="../index.html">home</a>

  <main class="game-list">
    <a class="game-link" href="fishing.html">Fishing</a>
  </main>
</body>
</html>
